# Tokyo Night colors
background #1a1b26
foreground #c0caf5
selection_background #283457
selection_foreground #c0caf5

# Cursor
cursor #c0caf5
cursor_text_color #1a1b26

# Black
color0 #15161e
color8 #414868

# Red
color1 #f7768e
color9 #f7768e

# Green
color2 #9ece6a
color10 #9ece6a

# Yellow
color3 #e0af68
color11 #e0af68

# Blue
color4 #7aa2f7
color12 #7aa2f7

# Magenta/Purple
color5 #bb9af7
color13 #bb9af7

# Cyan
color6 #7dcfff
color14 #7dcfff

# White
color7 #a9b1d6
color15 #c0caf5

background_opacity 0.7
background_blur 1
foreground #e2f3ff
background #050d1a
selection_background #4ab3f4
selection_foreground #050d1a

# Cursor
cursor #7dd3fc
cursor_text_color #050d1a

# Font
font_family JetBrains Mono
font_size 12.0

# Padding
window_padding_width 12

# Ctrl+C and Ctrl+V for copy/paste
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

# Right click to paste
mouse_map right press ungrabbed paste_from_clipboard

# Ctrl+<key> to move by word
map ctrl+left send_text all \x1b[1;5D
map ctrl+right send_text all \x1b[1;5C
map ctrl+backspace send_text all \x17
map ctrl+delete send_text all \x1b[3;5~
